<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="SpinZone Notifications — Stay updated on likes, comments, followers, and pick results.">
    <title>Notifications | SpinZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/notificationsService.js" defer></script>
    <style>
        :root{--primary:#8b5cf6;--primary-hover:#7c3aed;--accent:#10b981;--gold:#f59e0b;--danger:#ef4444;--dark-bg:#0a0e1a;--card-bg:#141b2d;--card-border:#1e293b;--surface:#0f172a;--text-main:#f1f5f9;--text-muted:#64748b;--text-dim:#475569;--header-height:64px}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
        body{background:var(--dark-bg);color:var(--text-main);line-height:1.6;overflow-x:hidden}
        a{text-decoration:none;color:inherit;transition:color .2s}a:hover{color:var(--primary)}
        header{background:rgba(10,14,26,.92);backdrop-filter:blur(20px);padding:0 1.5rem;height:var(--header-height);border-bottom:1px solid var(--card-border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
        .logo{font-size:1.4rem;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:.5rem}.logo b{color:var(--primary)}.logo span{color:var(--text-main)}
        .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem}

        .sz-nav{background:var(--surface);border-bottom:1px solid var(--card-border);position:sticky;top:var(--header-height);z-index:90;overflow-x:auto;scrollbar-width:none}.sz-nav::-webkit-scrollbar{display:none}
        .sz-nav-inner{display:flex;max-width:1200px;margin:0 auto;padding:0 1rem}
        .sz-nav-link{padding:.75rem 1rem;font-size:.82rem;font-weight:600;color:var(--text-muted);white-space:nowrap;transition:color .2s,box-shadow .2s}.sz-nav-link:hover{color:var(--text-main)}.sz-nav-link.active{color:var(--primary);box-shadow:inset 0 -2px 0 var(--primary)}

        .container{max-width:800px;margin:0 auto;padding:1.5rem}

        .page-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
        .page-hdr h1{font-size:1.5rem;font-weight:800}
        .mark-all-btn{background:var(--primary);color:#fff;border:none;padding:.5rem 1rem;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}.mark-all-btn:hover{background:var(--primary-hover);transform:translateY(-1px)}

        .filters{display:flex;gap:.5rem;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:.5rem;scrollbar-width:none}.filters::-webkit-scrollbar{display:none}
        .filter-pill{padding:.4rem .9rem;border-radius:20px;font-size:.78rem;font-weight:600;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .2s}
        .filter-pill:hover{border-color:var(--primary);color:var(--text-main)}
        .filter-pill.active{background:var(--primary);border-color:var(--primary);color:#fff}

        .notif-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;overflow:hidden}
        .n-item{display:flex;gap:.75rem;padding:1rem 1.25rem;border-bottom:1px solid var(--card-border);cursor:pointer;transition:background .15s;align-items:flex-start}
        .n-item:last-child{border-bottom:none}
        .n-item:hover{background:var(--surface)}
        .n-item.unread{background:rgba(139,92,246,.05)}
        .n-item.unread::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:.55rem}
        .n-ico{width:38px;height:38px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
        .n-body{flex:1;min-width:0}
        .n-msg{font-size:.88rem;color:var(--text-muted);line-height:1.5}
        .n-item.unread .n-msg{color:var(--text-main)}
        .n-time{font-size:.72rem;color:var(--text-dim);margin-top:3px}
        .n-empty{text-align:center;padding:3rem 1rem;color:var(--text-dim);font-size:.9rem}
        .n-loading{text-align:center;padding:3rem;color:var(--text-dim);font-size:.85rem}

        .load-more{display:block;width:100%;padding:.75rem;background:var(--surface);border:1px solid var(--card-border);border-radius:8px;color:var(--text-muted);font-size:.82rem;font-weight:600;cursor:pointer;margin-top:1rem;transition:all .2s;text-align:center}.load-more:hover{border-color:var(--primary);color:var(--text-main)}

        .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card-bg);color:var(--text-main);border:1px solid var(--card-border);padding:.6rem 1.2rem;border-radius:10px;font-size:.82rem;z-index:10000;transition:transform .3s}.toast.show{transform:translateX(-50%) translateY(0)}
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo"><div class="logo-icon">🎰</div><span>Spin<b>Zone</b></span></a>
        <div id="headerAuth"></div>
    </header>
    <nav class="sz-nav">
        <div class="sz-nav-inner">
            <a href="/" class="sz-nav-link">Home</a>
            <a href="/wins.html" class="sz-nav-link">Wins</a>
            <a href="/picks.html" class="sz-nav-link">Picks</a>
            <a href="/discuss.html" class="sz-nav-link">Discuss</a>
            <a href="/casinos.html" class="sz-nav-link">Casinos</a>
            <a href="/sportsbook.html" class="sz-nav-link">Sportsbook</a>
            <a href="/insights.html" class="sz-nav-link">Insights</a>
            <a href="/premium.html" class="sz-nav-link">Premium</a>
        </div>
    </nav>

    <main class="container">
        <div class="page-hdr">
            <h1>🔔 Notifications</h1>
            <button class="mark-all-btn" id="markAllBtn">Mark all as read</button>
        </div>

        <div class="filters" id="typeFilters">
            <button class="filter-pill active" data-type="all">All</button>
            <button class="filter-pill" data-type="like">❤️ Likes</button>
            <button class="filter-pill" data-type="comment">💬 Comments</button>
            <button class="filter-pill" data-type="follow">👤 Followers</button>
            <button class="filter-pill" data-type="pick_result">🎯 Pick Results</button>
        </div>

        <div class="notif-card" id="notifList">
            <div class="n-loading">Loading notifications…</div>
        </div>
        <button class="load-more" id="loadMoreBtn" style="display:none">Load more</button>
    </main>

    <div class="toast" id="toast"></div>

<script>
const SB_URL='https://rcsntlpytbwosykkhzzg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc250bHB5dGJ3b3N5a2toenpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDg2NDEsImV4cCI6MjA4NzU4NDY0MX0.JZ8iZ6dFSQv_G5wgIJ7RGosA4WR5ZIwdvKbbKLjwXfI';

function _sb(){
    if(window._szSb) return window._szSb;
    window._szSb=window.supabase.createClient(SB_URL,SB_KEY);return window._szSb;
}

let currentUser=null;
let userProfile=null;
let allNotifications=[];
let currentFilter='all';
let page=0;
const PAGE_SIZE=30;

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function timeAgo(d){
    const s=Math.floor((Date.now()-new Date(d).getTime())/1000);
    if(s<60)return'just now';const m=Math.floor(s/60);if(m<60)return m+'m ago';
    const h=Math.floor(m/60);if(h<24)return h+'h ago';
    const dy=Math.floor(h/24);if(dy<30)return dy+'d ago';
    return new Date(d).toLocaleDateString();
}

function showToast(msg){
    const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
}

const iconMap={like:'❤️',comment:'💬',follow:'👤',pick_result:'🎯',system:'📢'};

function renderNotifications(){
    const el=document.getElementById('notifList');
    const filtered=currentFilter==='all'?allNotifications:allNotifications.filter(n=>n.type===currentFilter);
    const visible=filtered.slice(0,(page+1)*PAGE_SIZE);

    if(!visible.length){
        el.innerHTML='<div class="n-empty">No notifications'+(currentFilter!=='all'?' of this type':'')+'</div>';
        document.getElementById('loadMoreBtn').style.display='none';
        return;
    }

    el.innerHTML=visible.map(n=>`
        <div class="n-item ${n.is_read?'':'unread'}" data-nid="${esc(n.id)}">
            <div class="n-ico">${iconMap[n.type]||'🔔'}</div>
            <div class="n-body">
                <div class="n-msg">${esc(n.message||n.content||'New notification')}</div>
                <div class="n-time">${timeAgo(n.created_at)}</div>
            </div>
        </div>
    `).join('');

    document.getElementById('loadMoreBtn').style.display=visible.length<filtered.length?'block':'none';
}

async function loadNotifications(){
    if(!currentUser) return;
    try{
        if(window.NotificationsService){
            allNotifications=await NotificationsService.getNotifications(currentUser.id,{limit:200});
        }else{
            const{data}=await _sb().from('notifications').select('*')
                .eq('user_id',currentUser.id).order('created_at',{ascending:false}).limit(200);
            allNotifications=data||[];
        }
    }catch(e){
        allNotifications=[];
    }
    page=0;
    renderNotifications();
}

// Filter clicks
document.getElementById('typeFilters').addEventListener('click',e=>{
    const pill=e.target.closest('.filter-pill');if(!pill)return;
    document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    currentFilter=pill.dataset.type;
    page=0;
    renderNotifications();
});

// Mark all read
document.getElementById('markAllBtn').addEventListener('click',async()=>{
    if(!currentUser) return;
    allNotifications.forEach(n=>n.is_read=true);
    renderNotifications();
    showToast('All notifications marked as read');
    try{
        if(window.NotificationsService) await NotificationsService.markAllAsRead(currentUser.id);
        else await _sb().from('notifications').update({is_read:true}).eq('user_id',currentUser.id).eq('is_read',false);
    }catch(e){}
});

// Click to mark single as read
document.getElementById('notifList').addEventListener('click',async e=>{
    const item=e.target.closest('.n-item');if(!item)return;
    const nid=item.dataset.nid;if(!nid)return;
    const n=allNotifications.find(x=>x.id===nid);
    if(n&&!n.is_read){
        n.is_read=true;
        item.classList.remove('unread');
        try{
            if(window.NotificationsService) await NotificationsService.markAsRead(nid);
            else await _sb().from('notifications').update({is_read:true}).eq('id',nid);
        }catch(e){}
    }
    // Navigate to reference
    if(n&&n.reference_type&&n.reference_id){
        const routes={win:'/wins.html',post:'/discuss.html',pick:'/picks.html',profile:'/profile.html'};
        const base=routes[n.reference_type];
        if(base) window.location.href=base+'?id='+n.reference_id;
    }
});

// Load more
document.getElementById('loadMoreBtn').addEventListener('click',()=>{
    page++;
    renderNotifications();
});

// Real-time
function setupRealtime(){
    if(!currentUser) return;
    try{
        if(window.NotificationsService){
            NotificationsService.subscribeToNotifications(currentUser.id,newN=>{
                if(newN&&!allNotifications.find(n=>n.id===newN.id)){
                    allNotifications.unshift(newN);
                    renderNotifications();
                }
            });
        }
    }catch(e){}
}

// Auth header
async function renderHeaderAuth(){
    const el=document.getElementById('headerAuth');if(!el)return;
    if(currentUser){
        const name=userProfile?.display_name||userProfile?.username||currentUser.email?.split('@')[0]||'User';
        el.innerHTML=`<div style="display:flex;gap:.75rem;align-items:center">
            <span id="notifBellMount"></span>
            <a href="/profile.html" style="color:var(--text-main);font-weight:600;font-size:.85rem">${esc(name)}</a>
            <button onclick="_sb().auth.signOut().then(()=>location.href='/')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.82rem">Sign out</button>
        </div>`;
        if(window.NotificationsService){
            NotificationsService.mountNotificationBell(document.getElementById('notifBellMount'),{userId:currentUser.id});
        }
    }else{
        el.innerHTML=`<a href="/" style="color:var(--text-muted);font-size:.85rem;font-weight:600">Sign In</a>`;
    }
}

// Init
(async()=>{
    const sb=_sb();
    const{data:{session}}=await sb.auth.getSession();
    if(!session){
        document.getElementById('notifList').innerHTML='<div class="n-empty">Sign in to view notifications</div>';
        renderHeaderAuth();
        return;
    }
    currentUser=session.user;
    try{
        const{data:p}=await sb.from('profiles').select('display_name,username,profile_picture_url').eq('id',currentUser.id).single();
        userProfile=p;
    }catch(e){}
    renderHeaderAuth();
    loadNotifications();
    setupRealtime();
})();
</script>
</body>
</html>
