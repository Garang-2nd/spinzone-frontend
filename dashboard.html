<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpinZone | Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--primary:#8b5cf6;--accent:#10b981;--dark-bg:#0f172a;--card-bg:#1e293b;--text-main:#f8fafc;--text-muted:#94a3b8}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
        body{background:var(--dark-bg);color:var(--text-main);line-height:1.6;padding:2rem}
        .dashboard{max-width:1000px;margin:0 auto}
        .dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
        .dash-header h1{font-size:1.8rem;color:var(--primary)}
        .dash-header a{color:var(--text-muted);text-decoration:none;font-size:.9rem}.dash-header a:hover{color:var(--primary)}
        .login-box{max-width:400px;margin:4rem auto;text-align:center}
        .login-box h2{margin-bottom:1rem;color:var(--primary)}
        .login-box p{color:var(--text-muted);margin-bottom:1.5rem}
        .login-box input{width:100%;padding:.8rem;background:#0f172a;border:1px solid #334155;color:#fff;border-radius:8px;margin-bottom:.75rem;font-size:1rem;outline:none}
        .login-box input:focus{border-color:var(--primary)}
        .login-box button{width:100%;padding:.8rem;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}
        .login-box button:hover{background:#7c3aed}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
        .stat-card{background:var(--card-bg);border:1px solid #334155;border-radius:10px;padding:1.25rem;text-align:center}
        .stat-card .number{font-size:2rem;font-weight:800;color:var(--primary)}
        .stat-card .label{font-size:.85rem;color:var(--text-muted);margin-top:.25rem}
        .section{margin-bottom:2.5rem}
        .section h2{font-size:1.2rem;margin-bottom:1rem;color:var(--text-muted);text-transform:uppercase;font-size:.85rem;letter-spacing:.5px}
        table{width:100%;border-collapse:collapse;background:var(--card-bg);border-radius:10px;overflow:hidden}
        th,td{padding:.75rem 1rem;text-align:left;border-bottom:1px solid #334155;font-size:.9rem}
        th{background:#0f172a;color:var(--text-muted);font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px}
        td{color:var(--text-main)}
        .bar{height:8px;background:#334155;border-radius:4px;overflow:hidden;min-width:100px}
        .bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;transition:width .5s}
        .date-filter{display:flex;gap:.5rem;flex-wrap:wrap}
        .date-btn{padding:.4rem 1rem;background:var(--card-bg);border:1px solid #334155;color:var(--text-muted);border-radius:20px;cursor:pointer;font-size:.85rem;transition:.2s}
        .date-btn:hover,.date-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
        .empty{text-align:center;padding:3rem;color:var(--text-muted)}
        @media(max-width:600px){body{padding:1rem}.stats-grid{grid-template-columns:1fr 1fr}th,td{padding:.5rem .6rem;font-size:.8rem}.stat-card .number{font-size:1.5rem}}
    </style>
</head>
<body>
    <div class="dashboard">
        <div id="loginSection" class="login-box">
            <h2>Analytics Dashboard</h2>
            <p>Sign in with your admin account to view click data.</p>
            <input type="email" id="adminEmail" placeholder="Email">
            <input type="password" id="adminPassword" placeholder="Password">
            <button id="adminLogin">Sign In</button>
        </div>
        <div id="dashboardSection" style="display:none">
            <div class="dash-header">
                <h1>Click Analytics</h1>
                <div><a href="/">← Back to Site</a></div>
            </div>
            <div class="date-filter" id="dateFilter">
                <button class="date-btn active" data-days="7">7 Days</button>
                <button class="date-btn" data-days="30">30 Days</button>
                <button class="date-btn" data-days="90">90 Days</button>
                <button class="date-btn" data-days="0">All Time</button>
            </div>
            <div class="stats-grid" id="statsGrid"></div>
            <div class="section">
                <h2>Clicks by Casino</h2>
                <div id="casinoTable"></div>
            </div>
            <div class="section">
                <h2>Clicks by Source Article</h2>
                <div id="sourceTable"></div>
            </div>
            <div class="section">
                <h2>Recent Clicks</h2>
                <div id="recentTable"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL='https://rcsntlpytbwosykkhzzg.supabase.co';
        const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc250bHB5dGJ3b3N5a2toenpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDg2NDEsImV4cCI6MjA4NzU4NDY0MX0.JZ8iZ6dFSQv_G5wgIJ7RGosA4WR5ZIwdvKbbKLjwXfI';
        const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

        let currentDays=7;

        document.getElementById('adminLogin').addEventListener('click',async()=>{
            const email=document.getElementById('adminEmail').value;
            const password=document.getElementById('adminPassword').value;
            const{data,error}=await sb.auth.signInWithPassword({email,password});
            if(error){alert('Login failed: '+error.message);return}
            document.getElementById('loginSection').style.display='none';
            document.getElementById('dashboardSection').style.display='block';
            loadDashboard();
        });

        // Check existing session
        (async()=>{
            const{data:{session}}=await sb.auth.getSession();
            if(session){
                document.getElementById('loginSection').style.display='none';
                document.getElementById('dashboardSection').style.display='block';
                loadDashboard();
            }
        })();

        // Date filter buttons
        document.getElementById('dateFilter').addEventListener('click',(e)=>{
            if(!e.target.classList.contains('date-btn'))return;
            document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('active'));
            e.target.classList.add('active');
            currentDays=parseInt(e.target.dataset.days);
            loadDashboard();
        });

        async function loadDashboard(){
            let query=sb.from('click_tracking').select('*').order('created_at',{ascending:false});
            if(currentDays>0){
                const since=new Date();since.setDate(since.getDate()-currentDays);
                query=query.gte('created_at',since.toISOString());
            }
            const{data:clicks,error}=await query;
            if(error){
                document.getElementById('statsGrid').innerHTML='<div class="empty">Failed to load data. Make sure you are logged in as admin.</div>';
                return;
            }
            if(!clicks||clicks.length===0){
                document.getElementById('statsGrid').innerHTML='<div class="stat-card"><div class="number">0</div><div class="label">Total Clicks</div></div>';
                document.getElementById('casinoTable').innerHTML='<div class="empty">No clicks recorded yet. Share your articles to start tracking!</div>';
                document.getElementById('sourceTable').innerHTML='';
                document.getElementById('recentTable').innerHTML='';
                return;
            }

            // Unique visitors (by ip_hash)
            const uniqueVisitors=new Set(clicks.map(c=>c.ip_hash)).size;
            const loggedInClicks=clicks.filter(c=>c.user_id).length;
            const todayClicks=clicks.filter(c=>new Date(c.created_at).toDateString()===new Date().toDateString()).length;

            // Stats cards
            document.getElementById('statsGrid').innerHTML=`
                <div class="stat-card"><div class="number">${clicks.length}</div><div class="label">Total Clicks</div></div>
                <div class="stat-card"><div class="number">${uniqueVisitors}</div><div class="label">Unique Visitors</div></div>
                <div class="stat-card"><div class="number">${todayClicks}</div><div class="label">Today's Clicks</div></div>
                <div class="stat-card"><div class="number">${loggedInClicks}</div><div class="label">Logged-in Users</div></div>
            `;

            // Clicks by casino
            const byCasino={};
            clicks.forEach(c=>{const name=c.casino_name||c.slug;byCasino[name]=(byCasino[name]||0)+1});
            const casinoSorted=Object.entries(byCasino).sort((a,b)=>b[1]-a[1]);
            const maxClicks=casinoSorted.length?casinoSorted[0][1]:1;

            document.getElementById('casinoTable').innerHTML=`<table><thead><tr><th>Casino</th><th>Clicks</th><th>Share</th></tr></thead><tbody>${
                casinoSorted.map(([name,count])=>`<tr><td>${esc(name)}</td><td><strong>${count}</strong></td><td><div class="bar"><div class="bar-fill" style="width:${(count/maxClicks*100)}%"></div></div></td></tr>`).join('')
            }</tbody></table>`;

            // Clicks by source
            const bySource={};
            clicks.forEach(c=>{const src=c.source_page||'direct';bySource[src]=(bySource[src]||0)+1});
            const sourceSorted=Object.entries(bySource).sort((a,b)=>b[1]-a[1]);

            document.getElementById('sourceTable').innerHTML=`<table><thead><tr><th>Source</th><th>Clicks</th></tr></thead><tbody>${
                sourceSorted.map(([src,count])=>`<tr><td>${esc(src)}</td><td><strong>${count}</strong></td></tr>`).join('')
            }</tbody></table>`;

            // Recent clicks (last 20)
            document.getElementById('recentTable').innerHTML=`<table><thead><tr><th>Time</th><th>Casino</th><th>Source</th><th>User</th></tr></thead><tbody>${
                clicks.slice(0,20).map(c=>{
                    const time=new Date(c.created_at).toLocaleString();
                    const user=c.user_id?'Registered':'Anonymous';
                    return`<tr><td>${time}</td><td>${esc(c.casino_name||c.slug)}</td><td>${esc(c.source_page||'direct')}</td><td>${user}</td></tr>`;
                }).join('')
            }</tbody></table>`;
        }

        function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
    </script>
</body>
</html>
