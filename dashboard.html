<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="SpinZone User Dashboard">
    <title>Dashboard | SpinZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--primary:#8b5cf6;--primary-hover:#7c3aed;--accent:#10b981;--gold:#f59e0b;--danger:#ef4444;--dark-bg:#0a0e1a;--card-bg:#141b2d;--card-border:#1e293b;--surface:#0f172a;--text-main:#f1f5f9;--text-muted:#64748b;--text-dim:#475569;--header-height:64px}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
        body{background:var(--dark-bg);color:var(--text-main);line-height:1.6;overflow-x:hidden;min-height:100vh}
        a{text-decoration:none;color:inherit;transition:color .2s}a:hover{color:var(--primary)}
        :focus-visible{outline:2px solid var(--accent);outline-offset:2px}

        header{background:rgba(10,14,26,.92);backdrop-filter:blur(20px);padding:0 1.5rem;height:var(--header-height);border-bottom:1px solid var(--card-border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
        .logo{font-size:1.4rem;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:.5rem}.logo b{color:var(--primary)}.logo span{color:var(--text-main)}
        .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
        .btn-gold{background:linear-gradient(135deg,var(--gold),#d97706);color:#000;font-weight:700;border:none;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .2s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem}.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(245,158,11,.3);color:#000}
        .sz-nav{background:var(--surface);border-bottom:1px solid var(--card-border);position:sticky;top:var(--header-height);z-index:90;overflow-x:auto;scrollbar-width:none}.sz-nav::-webkit-scrollbar{display:none}
        .sz-nav-inner{display:flex;max-width:1200px;margin:0 auto;padding:0 1rem}
        .sz-nav-link{padding:.85rem 1.25rem;font-size:.85rem;font-weight:600;color:var(--text-muted);white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:.4rem}.sz-nav-link:hover{color:var(--text-main)}.sz-nav-link.active{color:var(--primary);border-bottom-color:var(--primary)}
        .badge-nav{font-size:.6rem;padding:1px 5px;border-radius:4px;font-weight:700}.badge-nav.red{background:var(--danger);color:#fff}.badge-nav.gold{background:var(--gold);color:#000}

        /* LAYOUT */
        .dash-wrap{max-width:1100px;margin:0 auto;padding:2rem 1rem 4rem;display:grid;grid-template-columns:1fr 320px;gap:2rem;align-items:start}

        /* WELCOME BANNER */
        .welcome-banner{background:linear-gradient(135deg,rgba(139,92,246,.15) 0%,rgba(16,185,129,.1) 100%);border:1px solid rgba(139,92,246,.25);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.25rem}
        .welcome-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}
        .welcome-avatar img{width:100%;height:100%;object-fit:cover}
        .welcome-info h2{font-size:1.25rem;font-weight:800;margin-bottom:.15rem}
        .welcome-info p{font-size:.85rem;color:var(--text-muted)}
        .welcome-actions{margin-left:auto;display:flex;gap:.5rem;flex-shrink:0}
        .btn-sm-primary{padding:.45rem 1rem;background:var(--primary);color:#fff;border:none;border-radius:7px;font-weight:700;font-size:.8rem;cursor:pointer;transition:.2s;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem}.btn-sm-primary:hover{background:var(--primary-hover);color:#fff}
        .btn-sm-outline{padding:.45rem 1rem;background:transparent;color:var(--text-muted);border:1px solid var(--card-border);border-radius:7px;font-weight:600;font-size:.8rem;cursor:pointer;transition:.2s;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem}.btn-sm-outline:hover{border-color:var(--text-main);color:var(--text-main)}

        /* STATS ROW */
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
        .stat-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:1.25rem;text-align:center;transition:.2s;cursor:default}.stat-card:hover{border-color:var(--primary);transform:translateY(-2px)}
        .stat-card .stat-icon{font-size:1.4rem;margin-bottom:.35rem}
        .stat-card .stat-num{font-size:1.6rem;font-weight:800;line-height:1.1}
        .stat-card .stat-lbl{font-size:.72rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-top:.2rem}
        .stat-card .stat-delta{font-size:.75rem;margin-top:.3rem;font-weight:600}
        .delta-up{color:var(--accent)}.delta-down{color:var(--danger)}.delta-flat{color:var(--text-dim)}

        /* SECTION */
        .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
        .section-header h3{font-size:1rem;font-weight:700}
        .view-all{font-size:.82rem;color:var(--primary);font-weight:600}.view-all:hover{text-decoration:underline}

        /* TABS */
        .tab-bar{display:flex;gap:.35rem;margin-bottom:1.25rem;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}.tab-bar::-webkit-scrollbar{display:none}
        .tab-btn{padding:.45rem 1.1rem;background:transparent;border:1px solid var(--card-border);color:var(--text-muted);cursor:pointer;border-radius:20px;transition:all .2s;font-size:.83rem;font-weight:600;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:.35rem}.tab-btn:hover{border-color:var(--text-main);color:var(--text-main)}.tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

        /* FEED CARDS */
        .feed-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:.75rem;transition:all .2s;cursor:pointer}.feed-card:hover{border-color:var(--primary);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
        .feed-card-row{display:flex;justify-content:space-between;align-items:flex-start;gap:.75rem}
        .feed-card-body{flex:1;min-width:0}
        .feed-card-type{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 7px;border-radius:4px;margin-bottom:.35rem;display:inline-block}
        .type-win{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.2)}
        .type-post{background:rgba(139,92,246,.15);color:#8b5cf6;border:1px solid rgba(139,92,246,.2)}
        .type-pick{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
        .feed-card-title{font-size:.92rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.2rem}
        .feed-card-sub{font-size:.8rem;color:var(--text-muted)}
        .feed-card-amount{font-size:1.2rem;font-weight:800;color:var(--accent);white-space:nowrap}
        .feed-card-time{font-size:.72rem;color:var(--text-dim);white-space:nowrap;flex-shrink:0;margin-top:.15rem}
        .feed-card-footer{display:flex;gap:1rem;margin-top:.6rem;font-size:.78rem;color:var(--text-dim)}
        .feed-card-footer span{display:flex;align-items:center;gap:.25rem}
        .pick-result{font-size:.72rem;padding:2px 6px;border-radius:4px;font-weight:600}
        .result-win{background:rgba(16,185,129,.15);color:#10b981}
        .result-loss{background:rgba(239,68,68,.15);color:#ef4444}
        .result-pending{background:rgba(245,158,11,.15);color:#f59e0b}
        .empty-feed{text-align:center;padding:2.5rem;color:var(--text-dim);font-size:.9rem;border:1px dashed var(--card-border);border-radius:10px}
        .loading-feed{text-align:center;padding:2rem;color:var(--text-muted);font-size:.9rem}

        /* SIDEBAR */
        .sidebar-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
        .sidebar-card-title{font-size:.88rem;font-weight:800;margin-bottom:1rem;display:flex;align-items:center;gap:.4rem}

        /* NOTIFICATIONS */
        .notif-item{display:flex;gap:.75rem;padding:.7rem 0;border-bottom:1px solid var(--card-border);cursor:pointer;transition:.2s}.notif-item:last-child{border-bottom:none}.notif-item:hover{opacity:.85}
        .notif-item.unread .notif-text{color:var(--text-main)}.notif-item.unread::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:.45rem}
        .notif-icon{width:34px;height:34px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
        .notif-text{font-size:.82rem;color:var(--text-muted);line-height:1.4;flex:1}
        .notif-time{font-size:.72rem;color:var(--text-dim);white-space:nowrap}
        .notif-badge{background:var(--primary);color:#fff;font-size:.65rem;padding:1px 6px;border-radius:10px;font-weight:700;margin-left:.4rem}

        /* ACTIVITY FEED (followed users) */
        .activity-item{display:flex;gap:.75rem;align-items:flex-start;padding:.7rem 0;border-bottom:1px solid var(--card-border)}.activity-item:last-child{border-bottom:none}
        .activity-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}
        .activity-avatar img{width:100%;height:100%;object-fit:cover}
        .activity-text{font-size:.82rem;color:var(--text-muted);flex:1;line-height:1.4}
        .activity-text strong{color:var(--text-main);font-weight:600}
        .activity-time{font-size:.72rem;color:var(--text-dim);white-space:nowrap}

        /* QUICK ACTIONS */
        .quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem}
        .quick-btn{background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:1rem;text-align:center;cursor:pointer;transition:.2s;text-decoration:none;display:block}.quick-btn:hover{border-color:var(--primary);transform:translateY(-2px)}.quick-btn .qb-icon{font-size:1.5rem;margin-bottom:.3rem}.quick-btn .qb-label{font-size:.8rem;font-weight:600;color:var(--text-muted)}

        .toast{position:fixed;bottom:20px;right:20px;background:var(--card-bg);border-left:4px solid var(--accent);padding:1rem 1.5rem;border-radius:6px;box-shadow:0 10px 15px rgba(0,0,0,.5);transform:translateY(100px);transition:.3s;z-index:3000;font-weight:600;max-width:90%}.toast.error{border-left-color:var(--danger)}.toast.active{transform:translateY(0)}

        footer{text-align:center;padding:2rem 1rem;color:var(--text-dim);border-top:1px solid var(--card-border);margin-top:2rem;font-size:.85rem}

        @media(max-width:820px){
            .dash-wrap{grid-template-columns:1fr;gap:1.5rem}
            .stats-row{grid-template-columns:repeat(2,1fr)}
            .welcome-actions{display:none}
        }
        @media(max-width:600px){
            header{padding:0 .75rem;height:56px}:root{--header-height:56px}
            .logo{font-size:1.1rem}
            .dash-wrap{padding:1rem .75rem 3rem}
            .stats-row{grid-template-columns:repeat(2,1fr);gap:.75rem}
            .stat-card{padding:1rem}
            .stat-card .stat-num{font-size:1.3rem}
            .quick-actions{grid-template-columns:repeat(4,1fr)}
            .quick-btn{padding:.75rem .5rem}
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo"><div class="logo-icon">🎲</div><div><b>Spin</b><span>Zone</span></div></a>
        <div style="display:flex;align-items:center;gap:.75rem">
            <div id="headerAuth"></div>
            <a href="/premium.html" class="btn-gold">👑 Go Pro</a>
        </div>
    </header>
    <nav class="sz-nav"><div class="sz-nav-inner">
        <a class="sz-nav-link" href="/">🏠 Home</a>
        <a class="sz-nav-link" href="/sportsbook.html">⚽ Sports <span class="badge-nav red">NEW</span></a>
        <a class="sz-nav-link" href="/casinos.html">🎰 Casinos</a>
        <a class="sz-nav-link" href="/picks.html">🎯 Picks <span class="badge-nav red">HOT</span></a>
        <a class="sz-nav-link" href="/wins.html">🏆 Wins</a>
        <a class="sz-nav-link" href="/insights.html">📊 Insights <span class="badge-nav gold">PRO</span></a>
        <a class="sz-nav-link" href="/discuss.html">💬 Community</a>
        <a class="sz-nav-link" href="/premium.html">👑 Premium</a>
    </div></nav>

    <div class="toast" id="toast"></div>

    <div id="pageContent" style="min-height:60vh;display:flex;align-items:center;justify-content:center;color:var(--text-muted)">
        Loading dashboard…
    </div>

    <footer><p>SpinZone — Real Players. Real Wins. | 18+ Only. Please Gamble Responsibly.</p></footer>

    <script>
        const SUPABASE_URL='https://rcsntlpytbwosykkhzzg.supabase.co';
        const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc250bHB5dGJ3b3N5a2toenpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDg2NDEsImV4cCI6MjA4NzU4NDY0MX0.JZ8iZ6dFSQv_G5wgIJ7RGosA4WR5ZIwdvKbbKLjwXfI';
        const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

        let currentUser=null;
        let userProfile=null;
        let stats={wins:0,picks:0,posts:0,followers:0,following:0,rep:0};
        let currentFeedTab='wins';

        function showToast(m,err){
            const t=document.getElementById('toast');
            t.textContent=m;
            t.className=err?'toast active error':'toast active';
            setTimeout(()=>t.classList.remove('active'),3000);
        }
        function esc(t){if(t==null)return'';const d=document.createElement('div');d.textContent=String(t);return d.innerHTML}
        function timeAgo(d){
            const s=Math.floor((Date.now()-new Date(d))/1000);
            if(s<60)return'just now';
            if(s<3600)return Math.floor(s/60)+'m ago';
            if(s<86400)return Math.floor(s/3600)+'h ago';
            if(s<604800)return Math.floor(s/86400)+'d ago';
            return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
        }

        async function init(){
            try{
                const{data:{session}}=await sb.auth.getSession();
                if(!session){
                    document.getElementById('pageContent').innerHTML=`
                        <div style="text-align:center;padding:4rem 1rem">
                            <div style="font-size:3rem;margin-bottom:1rem">🎲</div>
                            <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:.75rem">Sign In to Your Dashboard</h2>
                            <p style="color:var(--text-muted);margin-bottom:1.5rem">Track your wins, picks, posts, and activity all in one place.</p>
                            <a href="/" style="background:var(--primary);color:#fff;padding:.7rem 1.75rem;border-radius:8px;font-weight:700;display:inline-block">Sign In</a>
                        </div>`;
                    return;
                }
                currentUser=session.user;
            }catch(e){return}

            // Fetch profile + stats in parallel
            try{
                const[profileRes,winsRes,picksRes,postsRes,followersRes,followingRes]=await Promise.all([
                    sb.from('user_profiles').select('*').eq('id',currentUser.id).single(),
                    sb.from('wins').select('id',{count:'exact',head:true}).eq('user_id',currentUser.id),
                    sb.from('picks').select('id',{count:'exact',head:true}).eq('user_id',currentUser.id),
                    sb.from('posts').select('id',{count:'exact',head:true}).eq('user_id',currentUser.id),
                    sb.from('follows').select('id',{count:'exact',head:true}).eq('following_id',currentUser.id),
                    sb.from('follows').select('id',{count:'exact',head:true}).eq('follower_id',currentUser.id),
                ]);
                userProfile=profileRes.data||{id:currentUser.id};
                stats.wins=winsRes.count||0;
                stats.picks=picksRes.count||0;
                stats.posts=postsRes.count||0;
                stats.followers=followersRes.count||0;
                stats.following=followingRes.count||0;
                stats.rep=userProfile.reputation_score||0;
            }catch(e){console.error(e)}

            renderDashboard();
            renderHeaderAuth();
            loadFeedTab('wins');
            loadNotifications();
            loadActivity();
        }

        function renderDashboard(){
            const p=userProfile||{};
            const name=p.display_name||p.username||currentUser.email?.split('@')[0]||'Player';
            const initial=name.charAt(0).toUpperCase();
            const avatarHtml=p.profile_picture_url
                ?`<img src="${esc(p.profile_picture_url)}" alt="${esc(name)}">`
                :initial;

            document.getElementById('pageContent').innerHTML=`
            <div class="dash-wrap">
                <!-- MAIN COLUMN -->
                <div>
                    <!-- Welcome -->
                    <div class="welcome-banner">
                        <div class="welcome-avatar">${avatarHtml}</div>
                        <div class="welcome-info">
                            <h2>Welcome back, ${esc(name)} 👋</h2>
                            <p>Here's what's happening with your SpinZone account.</p>
                        </div>
                        <div class="welcome-actions">
                            <a href="/profile.html" class="btn-sm-outline">View Profile</a>
                            <a href="/settings.html" class="btn-sm-primary">⚙️ Settings</a>
                        </div>
                    </div>

                    <!-- Quick Actions -->
                    <div class="quick-actions">
                        <a href="/wins.html" class="quick-btn"><div class="qb-icon">🏆</div><div class="qb-label">Post Win</div></a>
                        <a href="/picks.html" class="quick-btn"><div class="qb-icon">🎯</div><div class="qb-label">Add Pick</div></a>
                        <a href="/discuss.html" class="quick-btn"><div class="qb-icon">💬</div><div class="qb-label">New Post</div></a>
                        <a href="/casinos.html" class="quick-btn"><div class="qb-icon">🎰</div><div class="qb-label">Casinos</div></a>
                    </div>

                    <!-- Stats -->
                    <div class="stats-row">
                        <div class="stat-card">
                            <div class="stat-icon">🏆</div>
                            <div class="stat-num" style="color:var(--accent)">${stats.wins}</div>
                            <div class="stat-lbl">Wins Posted</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🎯</div>
                            <div class="stat-num" style="color:var(--gold)">${stats.picks}</div>
                            <div class="stat-lbl">Picks Made</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">👥</div>
                            <div class="stat-num" style="color:var(--primary)">${stats.followers}</div>
                            <div class="stat-lbl">Followers</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">⭐</div>
                            <div class="stat-num" style="color:#f59e0b">${stats.rep}</div>
                            <div class="stat-lbl">Reputation</div>
                        </div>
                    </div>

                    <!-- Recent Activity Feed -->
                    <div>
                        <div class="section-header">
                            <h3>Your Recent Activity</h3>
                            <a href="/profile.html" class="view-all">View all →</a>
                        </div>
                        <div class="tab-bar">
                            <button class="tab-btn active" data-tab="wins" onclick="switchFeedTab('wins',this)">🏆 Wins <span id="tbWins"></span></button>
                            <button class="tab-btn" data-tab="picks" onclick="switchFeedTab('picks',this)">🎯 Picks <span id="tbPicks"></span></button>
                            <button class="tab-btn" data-tab="posts" onclick="switchFeedTab('posts',this)">💬 Posts <span id="tbPosts"></span></button>
                        </div>
                        <div id="activityFeed"><div class="loading-feed">Loading…</div></div>
                    </div>
                </div>

                <!-- SIDEBAR -->
                <div>
                    <!-- Notifications -->
                    <div class="sidebar-card">
                        <div class="sidebar-card-title">🔔 Notifications <span class="notif-badge" id="notifCount" style="display:none"></span></div>
                        <div id="notifFeed"><div class="loading-feed" style="padding:1rem">Loading…</div></div>
                    </div>

                    <!-- Following Activity -->
                    <div class="sidebar-card">
                        <div class="sidebar-card-title">👥 Following Activity</div>
                        <div id="followingFeed"><div class="loading-feed" style="padding:1rem">Loading…</div></div>
                    </div>

                    <!-- Stats Summary -->
                    <div class="sidebar-card">
                        <div class="sidebar-card-title">📊 Your Stats</div>
                        <div style="display:flex;flex-direction:column;gap:.6rem">
                            <div style="display:flex;justify-content:space-between;font-size:.88rem"><span style="color:var(--text-muted)">Total Posts</span><strong>${stats.posts}</strong></div>
                            <div style="display:flex;justify-content:space-between;font-size:.88rem"><span style="color:var(--text-muted)">Following</span><strong>${stats.following}</strong></div>
                            <div style="display:flex;justify-content:space-between;font-size:.88rem"><span style="color:var(--text-muted)">Reputation</span><strong style="color:var(--gold)">${stats.rep} pts</strong></div>
                            ${userProfile?.is_pro||userProfile?.is_vip?`<div style="display:flex;justify-content:space-between;font-size:.88rem"><span style="color:var(--text-muted)">Membership</span><strong style="color:var(--gold)">${userProfile.is_vip?'VIP 👑':'Pro ⭐'}</strong></div>`:`<div style="margin-top:.5rem"><a href="/premium.html" class="btn-sm-primary" style="width:100%;justify-content:center;text-decoration:none">⭐ Upgrade to Pro</a></div>`}
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function switchFeedTab(tab,el){
            currentFeedTab=tab;
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            if(el)el.classList.add('active');
            loadFeedTab(tab);
        }

        async function loadFeedTab(tab){
            const feed=document.getElementById('activityFeed');
            if(!feed)return;
            feed.innerHTML='<div class="loading-feed">Loading…</div>';
            const userId=currentUser.id;

            try{
                if(tab==='wins'){
                    const{data:wins}=await sb.from('wins').select('*').eq('user_id',userId).order('created_at',{ascending:false}).limit(10);
                    const tbEl=document.getElementById('tbWins');
                    if(tbEl&&wins)tbEl.textContent=wins.length?'('+wins.length+')':'';
                    if(!wins||!wins.length){feed.innerHTML='<div class="empty-feed">No wins posted yet. <a href="/wins.html" style="color:var(--primary)">Post your first win! 🏆</a></div>';return}
                    feed.innerHTML=wins.map(w=>`
                        <div class="feed-card" onclick="location.href='/wins.html'">
                            <div class="feed-card-row">
                                <div class="feed-card-body">
                                    <span class="feed-card-type type-win">Win</span>
                                    <div class="feed-card-title">${esc(w.game_name||w.casino_name||'Win')}</div>
                                    <div class="feed-card-sub">${esc(w.casino_name||'')}${w.casino_name&&w.game_name?' · ':''}</div>
                                </div>
                                <div style="text-align:right;flex-shrink:0">
                                    <div class="feed-card-amount">${esc(w.win_amount||w.amount||'')}</div>
                                    <div class="feed-card-time">${timeAgo(w.created_at)}</div>
                                </div>
                            </div>
                            <div class="feed-card-footer"><span>❤️ ${w.likes_count||0}</span><span>💬 ${w.comments_count||0}</span></div>
                        </div>
                    `).join('');

                }else if(tab==='picks'){
                    const{data:picks}=await sb.from('picks').select('*').eq('user_id',userId).order('created_at',{ascending:false}).limit(10);
                    const tbEl=document.getElementById('tbPicks');
                    if(tbEl&&picks)tbEl.textContent=picks.length?'('+picks.length+')':'';
                    if(!picks||!picks.length){feed.innerHTML='<div class="empty-feed">No picks yet. <a href="/picks.html" style="color:var(--primary)">Share your first pick! 🎯</a></div>';return}
                    feed.innerHTML=picks.map(pk=>{
                        const rc=pk.result==='win'?'result-win':pk.result==='loss'?'result-loss':'result-pending';
                        const rl=pk.result==='win'?'✅ Won':pk.result==='loss'?'❌ Lost':'⏳ Pending';
                        return`<div class="feed-card" onclick="location.href='/picks.html'">
                            <div class="feed-card-row">
                                <div class="feed-card-body">
                                    <span class="feed-card-type type-pick">Pick</span>
                                    <div class="feed-card-title">${esc(pk.title||pk.selection||'Pick')}</div>
                                    <div class="feed-card-sub">${esc(pk.sport||'')}${pk.league?' · '+esc(pk.league):''}</div>
                                    <span class="pick-result ${rc}" style="margin-top:.3rem;display:inline-block">${rl}</span>
                                </div>
                                <div style="text-align:right;flex-shrink:0">
                                    ${pk.odds?`<div style="font-size:.85rem;color:var(--text-muted)">Odds: ${esc(pk.odds)}</div>`:''}
                                    <div class="feed-card-time">${timeAgo(pk.created_at)}</div>
                                </div>
                            </div>
                            <div class="feed-card-footer"><span>❤️ ${pk.likes_count||0}</span><span>💬 ${pk.comments_count||0}</span></div>
                        </div>`;
                    }).join('');

                }else if(tab==='posts'){
                    const{data:posts}=await sb.from('posts').select('*').eq('user_id',userId).order('created_at',{ascending:false}).limit(10);
                    const tbEl=document.getElementById('tbPosts');
                    if(tbEl&&posts)tbEl.textContent=posts.length?'('+posts.length+')':'';
                    if(!posts||!posts.length){feed.innerHTML='<div class="empty-feed">No posts yet. <a href="/discuss.html" style="color:var(--primary)">Start a discussion! 💬</a></div>';return}
                    feed.innerHTML=posts.map(po=>`
                        <div class="feed-card" onclick="location.href='/discuss.html'">
                            <div class="feed-card-row">
                                <div class="feed-card-body">
                                    <span class="feed-card-type type-post">${esc(po.type||'Post')}</span>
                                    <div class="feed-card-title">${esc(po.title||'Post')}</div>
                                    <div class="feed-card-sub">${esc((po.content||'').substring(0,80))}${(po.content||'').length>80?'…':''}</div>
                                </div>
                                <div class="feed-card-time" style="flex-shrink:0">${timeAgo(po.created_at)}</div>
                            </div>
                            <div class="feed-card-footer">
                                <span>❤️ ${Array.isArray(po.likes)?po.likes.length:(po.likes_count||0)}</span>
                                <span>💬 ${po.comments_count||0}</span>
                            </div>
                        </div>
                    `).join('');
                }
            }catch(e){
                console.error(e);
                feed.innerHTML='<div class="empty-feed">Failed to load. Please refresh.</div>';
            }
        }

        async function loadNotifications(){
            const el=document.getElementById('notifFeed');
            if(!el)return;
            try{
                // Try a notifications table; if not available fall back to a constructed list
                const{data:notifs,error}=await sb.from('notifications')
                    .select('*')
                    .eq('user_id',currentUser.id)
                    .order('created_at',{ascending:false})
                    .limit(8);

                if(error||!notifs||!notifs.length){
                    el.innerHTML='<div style="text-align:center;padding:1.5rem;color:var(--text-dim);font-size:.85rem">No new notifications</div>';
                    return;
                }

                const unreadCount=notifs.filter(n=>!n.is_read).length;
                const badge=document.getElementById('notifCount');
                if(badge&&unreadCount>0){badge.textContent=unreadCount;badge.style.display='inline-block';}

                const iconMap={follow:'👤',like:'❤️',comment:'💬',win:'🏆',pick:'🎯',system:'📢'};
                el.innerHTML=notifs.map(n=>`
                    <div class="notif-item ${!n.is_read?'unread':''}" onclick="markRead('${esc(n.id)}')">
                        <div class="notif-icon">${iconMap[n.type]||'🔔'}</div>
                        <div>
                            <div class="notif-text">${esc(n.message||n.content||'New notification')}</div>
                            <div class="notif-time">${timeAgo(n.created_at)}</div>
                        </div>
                    </div>
                `).join('');
            }catch(e){
                el.innerHTML='<div style="text-align:center;padding:1.5rem;color:var(--text-dim);font-size:.85rem">No new notifications</div>';
            }
        }

        async function markRead(notifId){
            try{await sb.from('notifications').update({is_read:true}).eq('id',notifId)}catch(e){}
        }

        async function loadActivity(){
            const el=document.getElementById('followingFeed');
            if(!el)return;
            try{
                // Get who the user follows
                const{data:follows}=await sb.from('follows').select('following_id').eq('follower_id',currentUser.id).limit(50);
                if(!follows||!follows.length){
                    el.innerHTML='<div style="text-align:center;padding:1.5rem;color:var(--text-dim);font-size:.85rem">Follow other players to see their activity here.</div>';
                    return;
                }
                const followingIds=follows.map(f=>f.following_id);

                // Get recent wins from followed users
                const{data:recentWins}=await sb.from('wins')
                    .select('*, user_profiles(username,display_name,profile_picture_url)')
                    .in('user_id',followingIds)
                    .order('created_at',{ascending:false})
                    .limit(8);

                const{data:recentPicks}=await sb.from('picks')
                    .select('*, user_profiles(username,display_name,profile_picture_url)')
                    .in('user_id',followingIds)
                    .order('created_at',{ascending:false})
                    .limit(5);

                // Merge and sort by date
                const allItems=[
                    ...(recentWins||[]).map(w=>({...w,_type:'win'})),
                    ...(recentPicks||[]).map(pk=>({...pk,_type:'pick'})),
                ].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,8);

                if(!allItems.length){
                    el.innerHTML='<div style="text-align:center;padding:1.5rem;color:var(--text-dim);font-size:.85rem">No recent activity from followed players.</div>';
                    return;
                }

                el.innerHTML=allItems.map(item=>{
                    const profile=item.user_profiles||{};
                    const uname=profile.display_name||profile.username||'Player';
                    const uinit=uname.charAt(0).toUpperCase();
                    const avatarHtml=profile.profile_picture_url?`<img src="${esc(profile.profile_picture_url)}" alt="${esc(uname)}">`:`${uinit}`;
                    const action=item._type==='win'
                        ?`posted a <strong>win</strong> of ${esc(item.win_amount||item.amount||'')} on ${esc(item.game_name||item.casino_name||'a game')}`
                        :`made a <strong>pick</strong>: ${esc(item.title||item.selection||'a pick')}`;
                    return`<div class="activity-item">
                        <a href="/profile.html?id=${esc(item.user_id)}" class="activity-avatar" style="text-decoration:none">${avatarHtml}</a>
                        <div>
                            <div class="activity-text"><strong>${esc(uname)}</strong> ${action}</div>
                            <div class="activity-time">${timeAgo(item.created_at)}</div>
                        </div>
                    </div>`;
                }).join('');
            }catch(e){
                console.error(e);
                el.innerHTML='<div style="text-align:center;padding:1.5rem;color:var(--text-dim);font-size:.85rem">Could not load activity.</div>';
            }
        }

        async function renderHeaderAuth(){
            const el=document.getElementById('headerAuth');
            if(!el||!currentUser)return;
            const p=userProfile||{};
            const name=p.display_name||p.username||currentUser.email?.split('@')[0]||'User';
            el.innerHTML=`<div style="display:flex;gap:.75rem;align-items:center">
                <a href="/profile.html" style="color:var(--text-main);font-weight:600;font-size:.85rem">${esc(name)}</a>
                <a href="/settings.html" style="color:var(--text-muted);font-size:.82rem">Settings</a>
                <button onclick="sb.auth.signOut().then(()=>location.href='/')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.82rem">Sign out</button>
            </div>`;
        }

        init();
    </script>
</body>
</html>
