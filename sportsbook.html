<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="SpinZone Sportsbook Reviews — Compare the best sports betting sites ranked by real bettors.">
    <title>Sportsbooks | SpinZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/notificationsService.js" defer></script>
    <style>
        :root{--primary:#8b5cf6;--primary-dark:#6d28d9;--accent:#10b981;--gold:#f59e0b;--danger:#ef4444;--dark-bg:#0a0e1a;--card-bg:#141b2d;--card-border:#1e293b;--surface:#0f172a;--text-main:#f1f5f9;--text-muted:#64748b;--text-dim:#475569;--header-height:64px}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
        body{background:var(--dark-bg);color:var(--text-main);line-height:1.6;overflow-x:hidden}
        a{text-decoration:none;color:inherit}
        header{background:rgba(10,14,26,.92);backdrop-filter:blur(20px);padding:0 1.5rem;height:var(--header-height);border-bottom:1px solid var(--card-border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
        .logo{font-size:1.4rem;font-weight:800;display:flex;align-items:center;gap:.5rem}.logo b{color:var(--primary)}.logo span{color:var(--text-main)}
        .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
        .btn-gold{background:linear-gradient(135deg,var(--gold),#d97706);color:#000;font-weight:700;border:none;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.85rem;display:inline-flex;align-items:center;gap:.3rem}
        .sz-nav{background:var(--surface);border-bottom:1px solid var(--card-border);position:sticky;top:var(--header-height);z-index:90;overflow-x:auto;scrollbar-width:none}.sz-nav::-webkit-scrollbar{display:none}
        .sz-nav-inner{display:flex;max-width:1200px;margin:0 auto;padding:0 1rem}
        .sz-nav-link{padding:.85rem 1.25rem;font-size:.85rem;font-weight:600;color:var(--text-muted);white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:.4rem}.sz-nav-link:hover{color:var(--text-main)}.sz-nav-link.active{color:var(--primary);border-bottom-color:var(--primary)}
        .badge-nav{font-size:.6rem;padding:1px 5px;border-radius:4px;font-weight:700}.badge-nav.red{background:var(--danger);color:#fff}.badge-nav.gold{background:var(--gold);color:#000}

        /* HERO */
        .hero{background:linear-gradient(135deg,rgba(16,185,129,.12),rgba(139,92,246,.08));border-bottom:1px solid rgba(16,185,129,.2);padding:2.5rem 1.5rem;text-align:center}
        .hero h1{font-size:2rem;font-weight:800;margin-bottom:.4rem}.hero h1 span{color:var(--accent)}
        .hero p{color:var(--text-muted);margin-bottom:1.5rem}
        .sport-pills{display:flex;flex-wrap:wrap;justify-content:center;gap:.5rem;max-width:700px;margin:0 auto}
        .sport-pill{padding:.35rem .9rem;border-radius:50px;border:1px solid var(--card-border);background:rgba(255,255,255,.05);font-size:.82rem;font-weight:600;cursor:pointer;color:var(--text-muted);transition:all .15s}
        .sport-pill:hover{border-color:var(--accent);color:var(--accent)}
        .sport-pill.active{background:rgba(16,185,129,.15);border-color:var(--accent);color:var(--accent)}

        /* LAYOUT */
        .page-wrap{max-width:1050px;margin:0 auto;padding:2rem 1rem 4rem}

        /* TOP PICKS BANNER */
        .top-banner{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
        @media(max-width:700px){.top-banner{grid-template-columns:1fr}}
        .top-pick{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:1.25rem;text-align:center;position:relative;transition:border-color .2s}
        .top-pick:hover{border-color:rgba(16,185,129,.4)}
        .top-pick.gold-pick{border-color:rgba(245,158,11,.4);background:linear-gradient(135deg,rgba(245,158,11,.06),var(--card-bg))}
        .pick-rank{position:absolute;top:.85rem;left:.85rem;font-size:.72rem;font-weight:800;padding:.2rem .5rem;border-radius:50px}
        .rank-1{background:var(--gold);color:#000}
        .rank-2{background:#94a3b8;color:#000}
        .rank-3{background:#cd7f32;color:#fff}
        .pick-emoji{font-size:2rem;margin-bottom:.5rem}
        .pick-name{font-size:1rem;font-weight:800;margin-bottom:.25rem}
        .pick-bonus{font-size:.8rem;color:var(--accent);font-weight:600;margin-bottom:.75rem}
        .pick-stars{color:var(--gold);font-size:.9rem;margin-bottom:.75rem}
        .btn-visit{display:block;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:.55rem 1rem;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
        .btn-visit:hover{background:#059669;transform:translateY(-1px)}

        /* FILTERS */
        .filters-row{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap}
        .sort-select{background:var(--card-bg);border:1px solid var(--card-border);color:var(--text-main);font-family:inherit;font-size:.82rem;padding:.4rem .75rem;border-radius:8px;cursor:pointer;margin-left:auto}
        .sort-select option{background:var(--surface)}
        .results-count{font-size:.82rem;color:var(--text-dim)}

        /* SB CARD */
        .sb-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:1.5rem;margin-bottom:.85rem;display:grid;grid-template-columns:70px 1fr auto;gap:1.25rem;align-items:start;transition:border-color .2s;position:relative}
        .sb-card:hover{border-color:rgba(16,185,129,.3)}
        .sb-card.featured{border-color:rgba(245,158,11,.3)}
        .feat-badge{position:absolute;top:.85rem;right:.85rem;background:linear-gradient(135deg,var(--gold),#d97706);color:#000;font-size:.62rem;font-weight:800;padding:.15rem .55rem;border-radius:50px;text-transform:uppercase}
        .sb-logo{width:60px;height:60px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#059669);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;overflow:hidden}
        .sb-logo img{width:100%;height:100%;object-fit:cover;border-radius:10px}
        .sb-name{font-size:1.05rem;font-weight:800;margin-bottom:.25rem}
        .sb-row{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.45rem}
        .sb-rating{font-size:.82rem;font-weight:700;color:var(--gold)}
        .sb-tag{font-size:.7rem;font-weight:600;padding:.15rem .5rem;border-radius:50px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text-muted)}
        .sb-tag.green{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:#34d399}
        .sb-bonus{font-size:.875rem;color:var(--text-muted);margin-bottom:.5rem}.sb-bonus strong{color:var(--accent)}
        .sports-covered{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.3rem}
        .sport-ico{font-size:.85rem;padding:.15rem .45rem;background:rgba(255,255,255,.05);border-radius:6px;border:1px solid rgba(255,255,255,.07)}
        .sb-cta{display:flex;flex-direction:column;gap:.45rem;min-width:120px;align-items:flex-end}
        .btn-bet{background:linear-gradient(135deg,var(--accent),#059669);color:#fff;border:none;padding:.6rem 1.1rem;border-radius:9px;font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;width:100%;text-align:center;transition:all .2s}
        .btn-bet:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(16,185,129,.3)}
        .btn-rev{background:transparent;border:1px solid var(--card-border);color:var(--text-muted);padding:.45rem .9rem;border-radius:7px;font-size:.78rem;cursor:pointer;width:100%;text-align:center;font-family:inherit;transition:all .15s}
        .btn-rev:hover{border-color:var(--accent);color:var(--accent)}
        .cta-note{font-size:.65rem;color:var(--text-dim);text-align:center}
        @media(max-width:600px){.sb-card{grid-template-columns:1fr}.sb-logo{display:none}.sb-cta{flex-direction:row;min-width:auto}}

        #toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:.85rem 1.25rem;font-size:.88rem;font-weight:600;color:var(--text-main);border-left:3px solid var(--accent);opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
        #toast.show{opacity:1;transform:translateY(0)}
    </style>
</head>
<body>
<header>
    <a href="/" class="logo"><div class="logo-icon">🎲</div><div><b>Spin</b><span>Zone</span></div></a>
    <div style="display:flex;align-items:center;gap:.75rem">
        <div id="headerAuth"></div>
        <a href="/premium.html" class="btn-gold">👑 Go Pro</a>
    </div>
</header>
<nav class="sz-nav"><div class="sz-nav-inner">
    <a class="sz-nav-link active" href="/sportsbook.html">⚽ Sports <span class="badge-nav red">NEW</span></a>
    <a class="sz-nav-link" href="/casinos.html">🎰 Casinos</a>
    <a class="sz-nav-link" href="/picks.html">🎯 Picks <span class="badge-nav red">HOT</span></a>
    <a class="sz-nav-link" href="/wins.html">🏆 Wins</a>
    <a class="sz-nav-link" href="/insights.html">📊 Insights <span class="badge-nav gold">PRO</span></a>
    <a class="sz-nav-link" href="/discuss.html">💬 Community</a>
    <a class="sz-nav-link" href="/premium.html">👑 Premium</a>
</div></nav>

<div class="hero">
    <h1>⚽ Best <span>Sportsbooks</span> 2025</h1>
    <p>Ranked by odds, markets, and payouts. Trusted by SpinZone bettors.</p>
    <div class="sport-pills" id="sportPills">
        <button class="sport-pill active" data-sport="all">All Sports</button>
        <button class="sport-pill" data-sport="nfl">🏈 NFL</button>
        <button class="sport-pill" data-sport="nba">🏀 NBA</button>
        <button class="sport-pill" data-sport="soccer">⚽ Soccer</button>
        <button class="sport-pill" data-sport="mlb">⚾ MLB</button>
        <button class="sport-pill" data-sport="nhl">🏒 NHL</button>
        <button class="sport-pill" data-sport="mma">🥊 MMA</button>
        <button class="sport-pill" data-sport="esports">🎮 eSports</button>
    </div>
</div>

<div class="page-wrap">
    <!-- Top 3 picks -->
    <div class="top-banner" id="topPicks"></div>

    <div class="filters-row">
        <span class="results-count" id="resultsCount">Loading…</span>
        <select class="sort-select" id="sortSelect" onchange="applySort()">
            <option value="rating">Top Rated</option>
            <option value="bonus">Biggest Bonus</option>
            <option value="odds">Best Odds</option>
            <option value="name">A–Z</option>
        </select>
    </div>
    <div id="sbFeed"></div>
</div>
<div id="toast"></div>

<script>
const SUPABASE_URL='https://rcsntlpytbwosykkhzzg.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc250bHB5dGJ3b3N5a2toenpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDg2NDEsImV4cCI6MjA4NzU4NDY0MX0.JZ8iZ6dFSQv_G5wgIJ7RGosA4WR5ZIwdvKbbKLjwXfI';
const sb=window._szSb||(window._szSb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY));

const FALLBACK_SB=[
    {id:1,name:'Stake.us',emoji:'♠️',rating:4.9,review_count:3201,bonus_offer:'$55 Gold Coin Welcome Package',bonus_amount:55,sports:['nfl','nba','soccer','mlb','nhl','mma','esports'],features:['⚡ Best Odds','📱 App','🎁 Daily Bonuses','🏆 Promos'],affiliate_url:'#',is_featured:true,odds_rating:9.8,markets:50000},
    {id:2,name:'BetUS',emoji:'🦅',rating:4.7,review_count:2100,bonus_offer:'125% Sports Welcome + 25% Reload',bonus_amount:2500,sports:['nfl','nba','soccer','mlb','nhl','mma'],features:['💰 Big Bonuses','⚽ Great Lines','📊 Live Betting','🔄 Fast Payouts'],affiliate_url:'#',is_featured:true,odds_rating:9.2,markets:30000},
    {id:3,name:'Bovada',emoji:'🐂',rating:4.6,review_count:4500,bonus_offer:'75% Bitcoin Welcome Bonus',bonus_amount:750,sports:['nfl','nba','soccer','mlb','nhl','mma'],features:['₿ Crypto','🏈 NFL Focus','🎰 Casino Too','⚡ Fast Withdrawals'],affiliate_url:'#',is_featured:true,odds_rating:9.0,markets:25000},
    {id:4,name:'MyBookie',emoji:'📖',rating:4.5,review_count:1800,bonus_offer:'100% Welcome Bonus Up to $1,000',bonus_amount:1000,sports:['nfl','nba','soccer','mlb','nhl','mma','esports'],features:['🎯 Sharp Lines','📱 Mobile Friendly','🔄 Same Day Pay','🏆 Great Promos'],affiliate_url:'#',is_featured:false,odds_rating:8.8,markets:22000},
    {id:5,name:'BetOnline',emoji:'💻',rating:4.4,review_count:2300,bonus_offer:'50% Welcome Bonus Up to $1,000',bonus_amount:1000,sports:['nfl','nba','soccer','mlb','nhl','mma'],features:['🌍 Wide Coverage','₿ Crypto Accepted','📊 Live In-Play','⚡ Quick Payouts'],affiliate_url:'#',is_featured:false,odds_rating:8.7,markets:28000},
    {id:6,name:'SportsBetting.ag',emoji:'🎰',rating:4.3,review_count:1200,bonus_offer:'50% Sports + 25% Reload',bonus_amount:1000,sports:['nfl','nba','soccer','mlb','nhl'],features:['🎲 Casino + Sports','💳 Many Methods','📱 Mobile App','🔄 Fast Crypto'],affiliate_url:'#',is_featured:false,odds_rating:8.5,markets:20000},
    {id:7,name:'Cloudbet Sports',emoji:'☁️',rating:4.2,review_count:890,bonus_offer:'100% Welcome Bonus Up to 5 BTC',bonus_amount:null,sports:['nfl','nba','soccer','mlb','nhl','mma','esports'],features:['₿ Bitcoin Only','🎮 eSports Leader','⚡ Instant Bet','🌍 150+ Countries'],affiliate_url:'#',is_featured:false,odds_rating:8.3,markets:18000},
];

const SPORT_EMOJIS={nfl:'🏈',nba:'🏀',soccer:'⚽',mlb:'⚾',nhl:'🏒',mma:'🥊',esports:'🎮',boxing:'🥊',tennis:'🎾',golf:'⛳'};

let allSB=[...FALLBACK_SB];
let filtered=[...FALLBACK_SB];
let currentSport='all';

function esc(v){const d=document.createElement('div');d.textContent=String(v??'');return d.innerHTML}
function stars(r){return'★'.repeat(Math.floor(r))+(r%1>=.5?'½':'')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.className='show';setTimeout(()=>t.className='',3200)}

async function loadFromDB(){
    try{const{data,error}=await sb.from('sportsbooks').select('*').order('rating',{ascending:false});if(!error&&data?.length)allSB=data;}catch(e){}
    applyFilters();
    renderTopPicks();
}

function renderTopPicks(){
    const top=allSB.filter(s=>s.is_featured).slice(0,3);
    const ranks=[{cls:'rank-1',label:'#1 Pick'},{cls:'rank-2',label:'#2 Pick'},{cls:'rank-3',label:'#3'}];
    document.getElementById('topPicks').innerHTML=top.map((s,i)=>`
        <div class="top-pick${i===0?' gold-pick':''}">
            <span class="pick-rank ${ranks[i]?.cls||''}">${ranks[i]?.label||''}</span>
            <div class="pick-emoji">${s.emoji||'⚽'}</div>
            <div class="pick-name">${esc(s.name)}</div>
            <div class="pick-bonus">${esc(s.bonus_offer||'Great Bonuses')}</div>
            <div class="pick-stars">${stars(s.rating)} ${Number(s.rating).toFixed(1)}</div>
            <a class="btn-visit" href="${esc(s.affiliate_url||'#')}" target="_blank" rel="noopener noreferrer">Bet Now →</a>
        </div>`).join('');
}

function applyFilters(){
    filtered=allSB.filter(s=>currentSport==='all'||(s.sports||[]).includes(currentSport));
    applySort(false);
}

function applySort(rerender=true){
    const sort=document.getElementById('sortSelect')?.value||'rating';
    if(sort==='rating')filtered.sort((a,b)=>b.rating-a.rating);
    else if(sort==='bonus')filtered.sort((a,b)=>(b.bonus_amount||0)-(a.bonus_amount||0));
    else if(sort==='odds')filtered.sort((a,b)=>(b.odds_rating||0)-(a.odds_rating||0));
    else filtered.sort((a,b)=>a.name.localeCompare(b.name));
    renderSB();
}

function renderSB(){
    const feed=document.getElementById('sbFeed');
    const count=document.getElementById('resultsCount');
    if(count)count.textContent=filtered.length+' sportsbook'+(filtered.length!==1?'s':'');
    if(!filtered.length){feed.innerHTML=`<div style="text-align:center;padding:3rem;color:var(--text-dim)">No sportsbooks for this sport yet.</div>`;return;}
    feed.innerHTML=filtered.map((s,idx)=>{
        const sports=(s.sports||[]).map(sp=>`<span class="sport-ico">${SPORT_EMOJIS[sp]||'🏅'} ${sp.toUpperCase()}</span>`).join('');
        const feats=(s.features||[]).map(f=>`<span class="sb-tag green">${esc(f)}</span>`).join('');
        return`<div class="sb-card${s.is_featured?' featured':''}">
            ${s.is_featured?'<div class="feat-badge">⭐ Top Pick</div>':''}
            <div class="sb-logo">${s.logo_url?`<img src="${esc(s.logo_url)}" alt="">`:(s.emoji||'⚽')}</div>
            <div>
                <div class="sb-name">${esc(s.name)}</div>
                <div class="sb-row">
                    <span class="sb-rating">★ ${Number(s.rating).toFixed(1)}</span>
                    <span class="sb-tag">Odds ${Number(s.odds_rating||0).toFixed(1)}/10</span>
                    ${s.markets?`<span class="sb-tag">${(s.markets/1000).toFixed(0)}K+ Markets</span>`:''}
                </div>
                <div class="sb-bonus">🎁 <strong>${esc(s.bonus_offer||'Welcome Bonus')}</strong></div>
                <div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.4rem">${feats}</div>
                <div class="sports-covered">${sports}</div>
            </div>
            <div class="sb-cta">
                <a class="btn-bet" href="${esc(s.affiliate_url||'#')}" target="_blank" rel="noopener noreferrer">Bet Now →</a>
                <button class="btn-rev" onclick="toast('Full review coming soon!')">Review</button>
                <span class="cta-note">18+ · T&Cs apply</span>
            </div>
        </div>`;
    }).join('');
}

// Sport pills
document.getElementById('sportPills').addEventListener('click',e=>{
    const btn=e.target.closest('.sport-pill');if(!btn)return;
    document.querySelectorAll('.sport-pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentSport=btn.dataset.sport;
    applyFilters();
});

// Auth
async function renderAuth(){
    const el=document.getElementById('headerAuth');if(!el)return;
    const{data:{session}}=await sb.auth.getSession();
    if(session){
        const{data:p}=await sb.from('profiles').select('display_name,username').eq('id',session.user.id).single();
        const name=p?.display_name||p?.username||session.user.email?.split('@')[0]||'User';
        el.innerHTML=`<div style="display:flex;gap:.75rem;align-items:center"><span id="notifBellMount"></span><a href="/profile.html" style="color:var(--text-main);font-weight:600;font-size:.85rem">${esc(name)}</a><button onclick="sb.auth.signOut().then(()=>location.href='/')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.82rem">Sign out</button></div>`;
        if(window.NotificationsService){NotificationsService.mountNotificationBell(document.getElementById('notifBellMount'),{userId:session.user.id});}
    }else{el.innerHTML=`<a href="/" style="color:var(--text-muted);font-size:.85rem;font-weight:600">Sign In</a>`;}
}

renderAuth();
loadFromDB();
</script>
</body>
</html>
