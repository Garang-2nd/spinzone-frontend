<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="SpinZone Player Profile">
    <title>Profile | SpinZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/profileService.js" defer></script>
    <style>
        :root{--primary:#8b5cf6;--primary-hover:#7c3aed;--accent:#10b981;--gold:#f59e0b;--danger:#ef4444;--dark-bg:#0a0e1a;--card-bg:#141b2d;--card-border:#1e293b;--surface:#0f172a;--text-main:#f1f5f9;--text-muted:#64748b;--text-dim:#475569;--header-height:64px}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
        body{background:var(--dark-bg);color:var(--text-main);line-height:1.6;overflow-x:hidden}
        a{text-decoration:none;color:inherit;transition:color .2s}a:hover{color:var(--primary)}
        :focus-visible{outline:2px solid var(--accent);outline-offset:2px}

        /* HEADER */
        header{background:rgba(10,14,26,.92);backdrop-filter:blur(20px);padding:0 1.5rem;height:var(--header-height);border-bottom:1px solid var(--card-border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
        .logo{font-size:1.4rem;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:.5rem}.logo b{color:var(--primary)}.logo span{color:var(--text-main)}
        .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
        .btn-gold{background:linear-gradient(135deg,var(--gold),#d97706);color:#000;font-weight:700;border:none;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .2s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem}.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(245,158,11,.3);color:#000}

        /* NAV */
        .sz-nav{background:var(--surface);border-bottom:1px solid var(--card-border);position:sticky;top:var(--header-height);z-index:90;overflow-x:auto;scrollbar-width:none}.sz-nav::-webkit-scrollbar{display:none}
        .sz-nav-inner{display:flex;max-width:1200px;margin:0 auto;padding:0 1rem}
        .sz-nav-link{padding:.85rem 1.25rem;font-size:.85rem;font-weight:600;color:var(--text-muted);white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:.4rem}.sz-nav-link:hover{color:var(--text-main)}.sz-nav-link.active{color:var(--primary);border-bottom-color:var(--primary)}
        .badge-nav{font-size:.6rem;padding:1px 5px;border-radius:4px;font-weight:700}.badge-nav.red{background:var(--danger);color:#fff}.badge-nav.gold{background:var(--gold);color:#000}

        /* PROFILE LAYOUT */
        .profile-wrap{max-width:800px;margin:0 auto;padding:0 1rem 2rem}
        .profile-cover{height:180px;background:linear-gradient(135deg,#1e1145 0%,#0f172a 50%,#0c2d1e 100%);border-radius:0 0 16px 16px;position:relative;border:1px solid var(--card-border);border-top:none;overflow:hidden}
        .profile-cover-img{width:100%;height:100%;object-fit:cover;opacity:.6}
        .profile-header{display:flex;gap:1.5rem;align-items:flex-end;padding:0 1.5rem;margin-top:-50px;position:relative;z-index:2}
        .profile-avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));border:4px solid var(--dark-bg);display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden;position:relative;cursor:pointer}
        .profile-avatar img{width:100%;height:100%;object-fit:cover}
        .profile-avatar-edit{position:absolute;bottom:0;right:0;width:28px;height:28px;background:var(--primary);border:2px solid var(--dark-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.7rem;color:#fff;transition:.2s;opacity:0;transition:opacity .2s}.profile-avatar:hover .profile-avatar-edit{opacity:1}
        .profile-info{flex:1;min-width:0;padding-bottom:.5rem}
        .profile-name{font-size:1.5rem;font-weight:800;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
        .badge-verified{width:20px;height:20px;background:var(--accent);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.6rem;color:#fff;flex-shrink:0}
        .badge-pro{font-size:.6rem;padding:2px 8px;background:var(--primary);color:#fff;border-radius:4px;font-weight:700}
        .badge-vip{font-size:.6rem;padding:2px 8px;background:var(--gold);color:#000;border-radius:4px;font-weight:700}
        .profile-handle{color:var(--text-muted);font-size:.9rem;margin-top:.15rem}
        .profile-actions{display:flex;gap:.5rem;margin-top:1.25rem;padding:0 1.5rem;flex-wrap:wrap}
        .btn-follow{padding:.5rem 1.5rem;border-radius:8px;font-weight:700;font-size:.85rem;cursor:pointer;border:none;transition:all .2s}
        .btn-follow.follow{background:var(--primary);color:#fff}.btn-follow.follow:hover{background:var(--primary-hover)}
        .btn-follow.following{background:transparent;color:var(--text-muted);border:1px solid var(--card-border)}.btn-follow.following:hover{border-color:var(--danger);color:var(--danger)}
        .btn-edit-profile{padding:.5rem 1.5rem;background:transparent;color:var(--text-muted);border:1px solid var(--card-border);border-radius:8px;font-weight:600;font-size:.85rem;cursor:pointer;transition:.2s;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem}.btn-edit-profile:hover{border-color:var(--text-main);color:var(--text-main)}
        .btn-msg{padding:.5rem .75rem;background:transparent;color:var(--text-muted);border:1px solid var(--card-border);border-radius:8px;cursor:pointer;font-size:.85rem;transition:.2s}.btn-msg:hover{border-color:var(--primary);color:var(--primary)}
        .profile-bio{padding:1.25rem 1.5rem;color:var(--text-muted);font-size:.9rem;line-height:1.6}
        .profile-meta{display:flex;gap:1.5rem;padding:0 1.5rem .75rem;flex-wrap:wrap;font-size:.82rem;color:var(--text-dim)}
        .profile-meta span{display:flex;align-items:center;gap:.3rem}
        .profile-stats{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--card-border);border-bottom:1px solid var(--card-border)}
        .profile-stat{text-align:center;padding:.75rem;cursor:pointer;transition:.2s;border-right:1px solid var(--card-border)}.profile-stat:last-child{border-right:none}.profile-stat:hover{background:rgba(139,92,246,.05)}
        .profile-stat .num{font-size:1.1rem;font-weight:800}.profile-stat .lbl{font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}

        /* TABS */
        .profile-tabs{display:flex;border-bottom:1px solid var(--card-border);overflow-x:auto;scrollbar-width:none}.profile-tabs::-webkit-scrollbar{display:none}
        .profile-tab{padding:.85rem 1.5rem;font-size:.85rem;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;display:flex;align-items:center;gap:.4rem}.profile-tab:hover{color:var(--text-main)}.profile-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
        .tab-count{font-size:.7rem;background:var(--surface);border:1px solid var(--card-border);padding:1px 6px;border-radius:10px;color:var(--text-dim)}
        .profile-content{padding:1rem 0}
        .profile-empty{text-align:center;padding:3rem;color:var(--text-dim);font-size:.9rem}

        /* CONTENT CARDS */
        .p-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;transition:all .2s}.p-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
        .p-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
        .p-card-type{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:4px}
        .type-win{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.2)}
        .type-post{background:rgba(139,92,246,.15);color:#8b5cf6;border:1px solid rgba(139,92,246,.2)}
        .type-pick{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
        .p-card-time{font-size:.75rem;color:var(--text-dim)}
        .p-card-title{font-weight:700;font-size:1rem;margin-bottom:.25rem}
        .p-card-body{font-size:.85rem;color:var(--text-muted);line-height:1.5}
        .p-card-amount{font-size:1.4rem;font-weight:800;color:var(--accent);margin:.5rem 0}
        .p-card-footer{display:flex;gap:1.25rem;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--card-border);font-size:.8rem;color:var(--text-dim)}
        .p-card-footer span{display:flex;align-items:center;gap:.3rem;cursor:pointer;transition:.2s}.p-card-footer span:hover{color:var(--text-main)}
        .pick-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.75rem;padding:3px 8px;border-radius:4px;font-weight:600;margin-top:.4rem}
        .pick-win{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.2)}
        .pick-loss{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
        .pick-pending{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
        .odds-badge{font-size:.75rem;color:var(--text-muted);padding:2px 6px;background:var(--surface);border-radius:4px}
        .multiplier-badge{font-size:.8rem;color:var(--gold);font-weight:700;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);padding:2px 8px;border-radius:4px}

        /* MODAL */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;justify-content:center;align-items:center;z-index:2000;opacity:0;visibility:hidden;transition:.3s;padding:1rem;backdrop-filter:blur(5px)}.modal-overlay.active{opacity:1;visibility:visible}
        .modal-content{background:var(--card-bg);padding:2rem;border-radius:16px;width:100%;max-width:480px;border:1px solid #475569;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .3s}.modal-overlay.active .modal-content{transform:translateY(0)}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
        .modal-header h2{font-size:1.3rem;font-weight:800}
        .close-modal{background:none;border:none;color:var(--text-muted);font-size:1.5rem;cursor:pointer;line-height:1;padding:.25rem;transition:.2s}.close-modal:hover{color:#fff;transform:rotate(90deg)}
        .form-group{margin-bottom:1rem}.form-group label{display:block;font-size:.82rem;color:var(--text-muted);margin-bottom:.4rem;font-weight:600}
        .form-input{width:100%;padding:.75rem;background:#0f172a;border:1px solid var(--card-border);color:#fff;border-radius:8px;font-size:.9rem;outline:none;transition:.2s;font-family:inherit}.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(139,92,246,.15)}
        textarea.form-input{resize:vertical;min-height:80px}
        .btn-save{width:100%;padding:.75rem;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:.95rem;cursor:pointer;margin-top:.5rem;transition:.2s;display:flex;align-items:center;justify-content:center;gap:.5rem}.btn-save:hover{background:var(--primary-hover)}.btn-save:disabled{opacity:.6;cursor:not-allowed}

        .toast{position:fixed;bottom:20px;right:20px;background:var(--card-bg);border-left:4px solid var(--accent);padding:1rem 1.5rem;border-radius:6px;box-shadow:0 10px 15px rgba(0,0,0,.5);transform:translateY(100px);transition:.3s;z-index:3000;font-weight:600;max-width:90%}.toast.error{border-left-color:var(--danger)}.toast.active{transform:translateY(0)}
        .loading{text-align:center;padding:3rem;color:var(--text-muted)}
        footer{text-align:center;padding:2rem 1rem;color:var(--text-dim);border-top:1px solid var(--card-border);margin-top:2rem;font-size:.85rem}

        @media(max-width:600px){
            .profile-cover{height:120px}
            .profile-header{gap:1rem;padding:0 1rem;margin-top:-40px}
            .profile-avatar{width:80px;height:80px;font-size:2rem}
            .profile-name{font-size:1.2rem}
            .profile-actions{padding:0 1rem}
            .profile-bio,.profile-meta{padding-left:1rem;padding-right:1rem}
            .profile-stats{grid-template-columns:repeat(2,1fr)}
            .profile-tab{padding:.7rem 1rem;font-size:.8rem}
            .profile-content{padding:.75rem}
            .modal-content{padding:1.5rem;border-radius:12px 12px 0 0;align-self:flex-end;max-height:85vh}
            .modal-overlay{align-items:flex-end}
            header{padding:0 .75rem;height:56px}:root{--header-height:56px}
            .logo{font-size:1.1rem}
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo"><div class="logo-icon">🎲</div><div><b>Spin</b><span>Zone</span></div></a>
        <div style="display:flex;align-items:center;gap:.75rem">
            <div id="headerAuth"></div>
            <a href="/premium.html" class="btn-gold">👑 Go Pro</a>
        </div>
    </header>
    <nav class="sz-nav"><div class="sz-nav-inner">
        <a class="sz-nav-link" href="/">🏠 Home</a>
        <a class="sz-nav-link" href="/sportsbook.html">⚽ Sports <span class="badge-nav red">NEW</span></a>
        <a class="sz-nav-link" href="/casinos.html">🎰 Casinos</a>
        <a class="sz-nav-link" href="/picks.html">🎯 Picks <span class="badge-nav red">HOT</span></a>
        <a class="sz-nav-link" href="/wins.html">🏆 Wins</a>
        <a class="sz-nav-link" href="/insights.html">📊 Insights <span class="badge-nav gold">PRO</span></a>
        <a class="sz-nav-link" href="/discuss.html">💬 Community</a>
        <a class="sz-nav-link" href="/premium.html">👑 Premium</a>
    </div></nav>

    <div class="toast" id="toast"></div>

    <!-- EDIT PROFILE MODAL -->
    <div class="modal-overlay" id="editModal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="editModalTitle">Edit Profile</h2>
                <button class="close-modal" id="closeEdit" aria-label="Close">&times;</button>
            </div>
            <div class="form-group"><label for="editName">Display Name</label><input type="text" class="form-input" id="editName" placeholder="Your name" maxlength="50"></div>
            <div class="form-group"><label for="editUsername">Username</label><input type="text" class="form-input" id="editUsername" placeholder="@username" maxlength="30"></div>
            <div class="form-group"><label for="editBio">Bio</label><textarea class="form-input" id="editBio" placeholder="Tell us about yourself..." maxlength="200"></textarea></div>
            <div class="form-group"><label for="editLocation">Location</label><input type="text" class="form-input" id="editLocation" placeholder="City, Country" maxlength="80"></div>
            <div class="form-group"><label for="editWebsite">Website</label><input type="url" class="form-input" id="editWebsite" placeholder="https://yoursite.com"></div>
            <div class="form-group"><label for="editTwitter">Twitter / X Handle</label><input type="text" class="form-input" id="editTwitter" placeholder="@handle" maxlength="30"></div>
            <button class="btn-save" id="saveProfile">💾 Save Changes</button>
        </div>
    </div>

    <!-- PROFILE PAGE -->
    <div id="profilePage">
        <div class="loading" id="profileLoading">Loading profile...</div>
    </div>

    <footer>
        <p>SpinZone — Real Players. Real Wins. | 18+ Only. Please Gamble Responsibly.</p>
    </footer>

    <script>
        const SUPABASE_URL='https://rcsntlpytbwosykkhzzg.supabase.co';
        const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc250bHB5dGJ3b3N5a2toenpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDg2NDEsImV4cCI6MjA4NzU4NDY0MX0.JZ8iZ6dFSQv_G5wgIJ7RGosA4WR5ZIwdvKbbKLjwXfI';
        const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

        let currentUser=null;
        let viewedProfile=null;
        let currentTab='wins';
        const tabCounts={wins:0,picks:0,posts:0};

        function showToast(m,err){
            const t=document.getElementById('toast');
            t.textContent=m;
            t.className=err?'toast active error':'toast active';
            setTimeout(()=>t.classList.remove('active'),3000);
        }
        function esc(t){if(t==null)return'';const d=document.createElement('div');d.textContent=String(t);return d.innerHTML}
        function timeAgo(d){
            const s=Math.floor((Date.now()-new Date(d))/1000);
            if(s<60)return'just now';
            if(s<3600)return Math.floor(s/60)+'m ago';
            if(s<86400)return Math.floor(s/3600)+'h ago';
            if(s<604800)return Math.floor(s/86400)+'d ago';
            return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
        }

        async function init(){
            try{
                const{data:{session}}=await sb.auth.getSession();
                if(session)currentUser=session.user;
            }catch(e){}

            renderHeaderAuth();

            const params=new URLSearchParams(window.location.search);
            const profileId=params.get('id');
            if(!profileId&&!currentUser){
                document.getElementById('profilePage').innerHTML='<div class="loading"><p>Please <a href="/" style="color:var(--primary)">sign in</a> to view your profile.</p></div>';
                return;
            }
            await loadProfile(profileId||currentUser.id);
        }

        async function loadProfile(userId){
            try{
                const{data:profile,error}=await sb.from('user_profiles').select('*').eq('id',userId).single();
                if(error||!profile){
                    document.getElementById('profilePage').innerHTML='<div class="loading"><p>Profile not found. <a href="/" style="color:var(--primary)">Go home</a></p></div>';
                    return;
                }
                viewedProfile=profile;
                await renderProfile(profile);
                loadTabContent('wins');
            }catch(e){
                console.error(e);
                document.getElementById('profilePage').innerHTML='<div class="loading"><p>Error loading profile.</p></div>';
            }
        }

        async function renderProfile(p){
            const isOwn=currentUser&&currentUser.id===p.id;
            const name=p.display_name||p.username||'Player';
            const initial=name.charAt(0).toUpperCase();
            const avatarHtml=p.profile_picture_url
                ?`<img src="${esc(p.profile_picture_url)}" alt="${esc(name)}">`
                :initial;

            let badges='';
            if(p.is_verified)badges+='<span class="badge-verified" title="Verified">✓</span>';
            if(p.is_vip)badges+='<span class="badge-vip">VIP</span>';
            else if(p.is_pro)badges+='<span class="badge-pro">PRO</span>';

            let actionBtns='';
            if(isOwn){
                actionBtns=`
                    <a class="btn-edit-profile" href="/settings.html">⚙️ Edit Profile</a>
                `;
            }else if(currentUser){
                actionBtns=`
                    <button class="btn-follow follow" id="followBtn" onclick="toggleFollow('${esc(p.id)}')">Follow</button>
                    <button class="btn-msg" onclick="showToast('Messaging coming soon! 💬')">💬</button>
                `;
            }else{
                actionBtns=`<a href="/" class="btn-edit-profile" style="text-decoration:none">Sign in to follow</a>`;
            }

            let metaItems='';
            if(p.location)metaItems+=`<span>📍 ${esc(p.location)}</span>`;
            if(p.website)metaItems+=`<span><a href="${esc(p.website)}" target="_blank" rel="noopener" style="color:var(--primary)">🔗 Website</a></span>`;
            if(p.twitter_handle)metaItems+=`<span><a href="https://x.com/${esc(p.twitter_handle.replace('@',''))}" target="_blank" rel="noopener" style="color:var(--primary)">𝕏 ${esc(p.twitter_handle)}</a></span>`;
            metaItems+=`<span>📅 Joined ${new Date(p.created_at).toLocaleDateString('en-US',{month:'short',year:'numeric'})}</span>`;

            // Fetch follow counts
            let followersCount=p.followers_count||0;
            let followingCount=p.following_count||0;
            try{
                const[{count:fc},{count:fg}]=await Promise.all([
                    sb.from('follows').select('id',{count:'exact',head:true}).eq('following_id',p.id),
                    sb.from('follows').select('id',{count:'exact',head:true}).eq('follower_id',p.id)
                ]);
                followersCount=fc||0;followingCount=fg||0;
            }catch(e){}

            document.getElementById('profilePage').innerHTML=`
                <div class="profile-cover"></div>
                <div class="profile-wrap">
                    <div class="profile-header">
                        <div class="profile-avatar" id="profileAvatar">${avatarHtml}${isOwn?'<div class="profile-avatar-edit" onclick="document.getElementById(\'avatarInput\').click()">📷</div>':''}</div>
                        <div class="profile-info">
                            <div class="profile-name">${esc(name)} ${badges}</div>
                            <div class="profile-handle">@${esc(p.username||'player')}</div>
                        </div>
                    </div>
                    ${isOwn?'<input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)">':''}
                    <div class="profile-actions">${actionBtns}</div>
                    ${p.bio?`<div class="profile-bio">${esc(p.bio)}</div>`:''}
                    <div class="profile-meta">${metaItems}</div>
                    <div class="profile-stats">
                        <div class="profile-stat"><div class="num" id="statFollowers">${followersCount}</div><div class="lbl">Followers</div></div>
                        <div class="profile-stat"><div class="num" id="statFollowing">${followingCount}</div><div class="lbl">Following</div></div>
                        <div class="profile-stat"><div class="num" id="statWins">—</div><div class="lbl">Wins</div></div>
                        <div class="profile-stat"><div class="num">${p.reputation_score||0}</div><div class="lbl">Rep</div></div>
                    </div>
                    <div class="profile-tabs" id="profileTabs">
                        <div class="profile-tab active" data-tab="wins" onclick="switchTab('wins',this)">🏆 Wins <span class="tab-count" id="tcWins">…</span></div>
                        <div class="profile-tab" data-tab="picks" onclick="switchTab('picks',this)">🎯 Picks <span class="tab-count" id="tcPicks">…</span></div>
                        <div class="profile-tab" data-tab="posts" onclick="switchTab('posts',this)">💬 Posts <span class="tab-count" id="tcPosts">…</span></div>
                    </div>
                    <div class="profile-content" id="profileContent"><div class="loading">Loading…</div></div>
                </div>
            `;

            if(!isOwn&&currentUser)checkFollowStatus(p.id);
        }

        async function checkFollowStatus(targetId){
            try{
                const{data}=await sb.from('follows').select('id').eq('follower_id',currentUser.id).eq('following_id',targetId).maybeSingle();
                const btn=document.getElementById('followBtn');
                if(btn&&data){btn.className='btn-follow following';btn.textContent='Following'}
            }catch(e){}
        }

        async function toggleFollow(targetId){
            if(!currentUser){showToast('Sign in to follow',true);return}
            const btn=document.getElementById('followBtn');
            if(!btn)return;
            const isFollowing=btn.classList.contains('following');
            btn.disabled=true;
            try{
                if(isFollowing){
                    await sb.from('follows').delete().eq('follower_id',currentUser.id).eq('following_id',targetId);
                    btn.className='btn-follow follow';btn.textContent='Follow';
                    const el=document.getElementById('statFollowers');if(el)el.textContent=Math.max(0,parseInt(el.textContent||0)-1);
                }else{
                    await sb.from('follows').insert({follower_id:currentUser.id,following_id:targetId});
                    btn.className='btn-follow following';btn.textContent='Following';
                    const el=document.getElementById('statFollowers');if(el)el.textContent=parseInt(el.textContent||0)+1;
                }
            }catch(e){showToast('Failed to update follow',true);}
            finally{btn.disabled=false}
        }

        function switchTab(tab,el){
            currentTab=tab;
            document.querySelectorAll('.profile-tab').forEach(t=>t.classList.remove('active'));
            if(el)el.classList.add('active');
            loadTabContent(tab);
        }

        async function loadTabContent(tab){
            const container=document.getElementById('profileContent');
            if(!container||!viewedProfile)return;
            container.innerHTML='<div class="loading">Loading…</div>';
            const userId=viewedProfile.id;

            try{
                if(tab==='wins'){
                    const{data:wins}=await sb.from('wins').select('*').eq('user_id',userId).order('created_at',{ascending:false}).limit(30);
                    const count=(wins||[]).length;
                    tabCounts.wins=count;
                    const el=document.getElementById('tcWins');if(el)el.textContent=count;
                    const statEl=document.getElementById('statWins');if(statEl)statEl.textContent=count;
                    if(count){
                        container.innerHTML=(wins).map(w=>`
                            <div class="p-card">
                                <div class="p-card-header">
                                    <span class="p-card-type type-win">Win</span>
                                    <span class="p-card-time">${timeAgo(w.created_at)}</span>
                                </div>
                                <div class="p-card-body">${esc(w.game_name||'')}${w.casino_name?' · '+esc(w.casino_name):''}</div>
                                <div class="p-card-amount">${esc(w.win_amount||w.amount||'')} ${w.multiplier?'<span class="multiplier-badge">'+esc(w.multiplier)+'</span>':''}</div>
                                ${w.description?`<div class="p-card-body" style="margin-top:.25rem">${esc(w.description)}</div>`:''}
                                <div class="p-card-footer"><span>❤️ ${w.likes_count||0}</span><span>💬 ${w.comments_count||0}</span></div>
                            </div>
                        `).join('');
                    }else{container.innerHTML='<div class="profile-empty">No wins posted yet. 🎰</div>'}

                }else if(tab==='picks'){
                    const{data:picks}=await sb.from('picks').select('*').eq('user_id',userId).order('created_at',{ascending:false}).limit(30);
                    const count=(picks||[]).length;
                    tabCounts.picks=count;
                    const el=document.getElementById('tcPicks');if(el)el.textContent=count;
                    if(count){
                        container.innerHTML=(picks).map(pk=>{
                            const statusClass=pk.result==='win'?'pick-win':pk.result==='loss'?'pick-loss':'pick-pending';
                            const statusLabel=pk.result==='win'?'✅ Won':pk.result==='loss'?'❌ Lost':'⏳ Pending';
                            return`<div class="p-card">
                                <div class="p-card-header">
                                    <span class="p-card-type type-pick">Pick</span>
                                    <span class="p-card-time">${timeAgo(pk.created_at)}</span>
                                </div>
                                <div class="p-card-title">${esc(pk.title||pk.selection||'Pick')}</div>
                                ${pk.sport?`<div class="p-card-body">${esc(pk.sport)}${pk.league?' · '+esc(pk.league):''}</div>`:''}
                                <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem">
                                    <span class="pick-badge ${statusClass}">${statusLabel}</span>
                                    ${pk.odds?`<span class="odds-badge">Odds: ${esc(pk.odds)}</span>`:''}
                                    ${pk.stake?`<span class="odds-badge">Stake: ${esc(pk.stake)}</span>`:''}
                                </div>
                                ${pk.reasoning?`<div class="p-card-body" style="margin-top:.5rem">${esc(pk.reasoning)}</div>`:''}
                                <div class="p-card-footer"><span>❤️ ${pk.likes_count||0}</span><span>💬 ${pk.comments_count||0}</span></div>
                            </div>`;
                        }).join('');
                    }else{container.innerHTML='<div class="profile-empty">No picks posted yet. 🎯</div>'}

                }else if(tab==='posts'){
                    const{data:posts}=await sb.from('posts').select('*').eq('user_id',userId).order('created_at',{ascending:false}).limit(30);
                    const count=(posts||[]).length;
                    tabCounts.posts=count;
                    const el=document.getElementById('tcPosts');if(el)el.textContent=count;
                    if(count){
                        container.innerHTML=(posts).map(po=>`
                            <div class="p-card">
                                <div class="p-card-header">
                                    <span class="p-card-type type-post">${esc(po.type||'Post')}</span>
                                    <span class="p-card-time">${timeAgo(po.created_at)}</span>
                                </div>
                                <div class="p-card-title">${esc(po.title||'')}</div>
                                <div class="p-card-body">${esc((po.content||'').substring(0,220))}${(po.content||'').length>220?'…':''}</div>
                                <div class="p-card-footer">
                                    <span>❤️ ${Array.isArray(po.likes)?po.likes.length:(po.likes_count||0)}</span>
                                    <span>💬 ${po.comments_count||0}</span>
                                </div>
                            </div>
                        `).join('');
                    }else{container.innerHTML='<div class="profile-empty">No posts yet. 💬</div>'}
                }
            }catch(e){
                console.error(e);
                container.innerHTML='<div class="profile-empty">Failed to load content.</div>';
            }
        }

        async function handleAvatarUpload(event){
            const file=event.target.files[0];
            if(!file)return;
            if(file.size>5*1024*1024){showToast('Image must be under 5 MB',true);return}
            showToast('Uploading picture…');
            try{
                // Use ProfileService if loaded, otherwise inline
                if(window.ProfileService){
                    const{url,error}=await window.ProfileService.uploadProfilePicture(file);
                    if(error)throw error;
                    const av=document.getElementById('profileAvatar');
                    if(av){const img=av.querySelector('img')||document.createElement('img');img.src=url;if(!av.contains(img))av.prepend(img);}
                    showToast('Profile picture updated!');
                }else{
                    const ext=file.name.split('.').pop();
                    const path=`avatars/${currentUser.id}.${ext}`;
                    const{error:ue}=await sb.storage.from('profile-pictures').upload(path,file,{upsert:true,contentType:file.type});
                    if(ue)throw ue;
                    const{data:{publicUrl}}=sb.storage.from('profile-pictures').getPublicUrl(path);
                    await sb.from('user_profiles').update({profile_picture_url:publicUrl}).eq('id',currentUser.id);
                    const av=document.getElementById('profileAvatar');
                    if(av){let img=av.querySelector('img');if(!img){img=document.createElement('img');av.prepend(img);}img.src=publicUrl;}
                    showToast('Profile picture updated!');
                }
            }catch(e){showToast('Upload failed: '+(e.message||''),true)}
        }

        // EDIT MODAL
        document.getElementById('closeEdit').addEventListener('click',()=>document.getElementById('editModal').classList.remove('active'));
        document.getElementById('editModal').addEventListener('click',(e)=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('active')});
        document.addEventListener('keydown',(e)=>{if(e.key==='Escape')document.getElementById('editModal').classList.remove('active')});

        document.getElementById('saveProfile').addEventListener('click',async()=>{
            if(!currentUser)return;
            const btn=document.getElementById('saveProfile');
            btn.textContent='Saving…';btn.disabled=true;
            try{
                const updates={
                    display_name:document.getElementById('editName').value.trim()||null,
                    username:document.getElementById('editUsername').value.trim()||viewedProfile.username,
                    bio:document.getElementById('editBio').value.trim()||null,
                    location:document.getElementById('editLocation').value.trim()||null,
                    website:document.getElementById('editWebsite').value.trim()||null,
                    twitter_handle:document.getElementById('editTwitter').value.trim()||null,
                    updated_at:new Date().toISOString()
                };
                const{error}=await sb.from('user_profiles').update(updates).eq('id',currentUser.id);
                if(error)throw error;
                document.getElementById('editModal').classList.remove('active');
                showToast('Profile updated!');
                await loadProfile(currentUser.id);
            }catch(e){showToast('Failed to save: '+(e.message||''),true);}
            finally{btn.innerHTML='💾 Save Changes';btn.disabled=false}
        });

        function openEditModal(){
            if(!viewedProfile)return;
            document.getElementById('editName').value=viewedProfile.display_name||'';
            document.getElementById('editUsername').value=viewedProfile.username||'';
            document.getElementById('editBio').value=viewedProfile.bio||'';
            document.getElementById('editLocation').value=viewedProfile.location||'';
            document.getElementById('editWebsite').value=viewedProfile.website||'';
            document.getElementById('editTwitter').value=viewedProfile.twitter_handle||'';
            document.getElementById('editModal').classList.add('active');
        }

        async function renderHeaderAuth(){
            const el=document.getElementById('headerAuth');
            if(currentUser){
                let name=currentUser.email?.split('@')[0]||'User';
                try{
                    const{data:p}=await sb.from('user_profiles').select('username,display_name').eq('id',currentUser.id).single();
                    if(p)name=p.display_name||p.username||name;
                }catch(e){}
                el.innerHTML=`<div style="display:flex;gap:.75rem;align-items:center">
                    <a href="/profile.html" style="color:var(--text-main);font-weight:600;font-size:.85rem">${esc(name)}</a>
                    <a href="/dashboard.html" style="color:var(--text-muted);font-size:.82rem">Dashboard</a>
                    <button onclick="sb.auth.signOut().then(()=>location.href='/')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.82rem">Sign out</button>
                </div>`;
            }else{
                el.innerHTML=`<a href="/" style="color:var(--text-muted);font-size:.85rem;font-weight:600">Sign In</a>`;
            }
        }

        init();
    </script>
</body>
</html>
